<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Async Programming</h2>
    <button onclick="btn()">start</button>
    <p id="output"></p>
    <script>
        function btn(){
            // console.log("started");
            // setTimeout(() => {
            //     console.log("Inside settimeout");
            // }, 2000);
            // var a=()=>{
            //     console.log("inside a");
            // }
            // a();
            // console.log("ended");
            document.getElementById("output").innerHTML="first line<br>";
            setTimeout(() => {
                document.getElementById("output").innerHTML+="second line at the last<br>";
            }, 3000);
            document.getElementById("output").innerHTML+="third line<br><br><br>";
        }
    </script>
</body>
</html>
