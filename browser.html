<!DOCTYPE html>
<html>
<head>
    <title>Let Keyword Example</title>
</head>
<body>

    <h2>JavaScript let Variable Example</h2>

    <button onclick="browser()">Click Here</button>

    <script>
        let username = "Harini";

        function browser() {
            alert("Hello " + username + "! Welcome to the browser. Have a great day learning JavaScript!");
        }
    </script>

</body>
</html>
