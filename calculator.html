<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=Number(prompt("Enter a value:"));
        let b=Number(prompt("Enter b value:"));
        let choice =Number(prompt("Enter your choice:\n1. Addition\n2. Subtraction\n3. Multiplication\n4. Division\n5. Modulus")); 
        switch(choice){
            case 1:document.write("add:"+(a+b));break;
            case 2:document.write("sub:"+(a-b));break;
            case 3:document.write("mul:"+(a*b));break;
            case 4:document.write("div:"+(a/b));break;
            case 5:document.write("mod:"+(a%b));break;
            default:document.write("Invalid option");
        }
    </script>
</body>
</html>
