<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Creating event</h1>
    <script>
        function clickevent(){
            alert("welcome to event");
        }
        
    </script>
    <button onclick=clickevent()>click</button>
    <button onclick="alert('This is inline event handling!')">Click1</button>
</body>
</html>
