<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="btn">click me</button>
    <h1 id="content">happy num generation</h1>
    <script>
        function ishappynum(){
            let result="";
            for(let i=1;i<=200;i++){
                let n=i;
                while(n!=1&&n!=4){
                    let sum=0;
                    while(n!=0){
                        let r=n%10;
                        sum=sum+r*r;
                        n=Math.floor(n/10);
                    }
                n=sum;
                }
                if(n==1){
                    result+=i+" ";
                }
            }
            document.getElementById("btn").innerHTML=result;
        }
        document.getElementById("content").addEventListener("mouseover",function(){
            ishappynum(); 
                    
        });
    </script>
</body>
</html>
