<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class Emp{
            constructor(id,name){
                this.id=id;
                this.name=name;
            }
            details(){
                document.writeln(this.id+" "+this.name);
            }
        }
        let e=new Emp(19,"harini");
        e.details();
    </script>
</body>
</html>
